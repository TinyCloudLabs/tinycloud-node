[package]
name = "opencredentials-verify"
version = "0.1.0"
edition = "2021"
license-file = "../LICENSE.md"
description = "Issuer and verifier APIs for OpenCredentials policy-grade SD-JWT credentials"
repository = "https://github.com/TinyCloudLabs/OpenCredentials"

[dependencies]
base64 = "0.21.3"
opencredentials_sd_jwt = { path = "../opencredentials_sd_jwt" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[dev-dependencies]
sha2 = "0.10"
