[package]
name = "policy-core"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace]
members = [
    "crates/policy-evidence-vc",
    "crates/policy-engine-http",
    "crates/policy-runtime",
]
default-members = [
    ".",
    "crates/policy-evidence-vc",
    "crates/policy-engine-http",
    "crates/policy-runtime",
]

[lib]
name = "policy_core"
path = "src/lib.rs"

[dependencies]
base64 = "0.22"
bs58 = "0.5"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
ed25519-dalek = "2"
k256 = { version = "0.13", features = ["ecdsa"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sha3 = "0.10"
thiserror = "1"
unicode-normalization = "0.1"

[dev-dependencies]
opencredentials-verify = { path = "../opencredentials/opencredentials_verify" }
policy-evidence-vc = { path = "crates/policy-evidence-vc" }
