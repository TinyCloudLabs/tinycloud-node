[package]
name = "policy-engine-http"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
name = "policy_engine_http"
path = "src/lib.rs"

[dependencies]
axum = "0.8"
base64 = "0.22"
blake3 = "1"
bs58 = "0.5"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
data-encoding = "2"
ed25519-dalek = "2"
getrandom = "0.2"
opencredentials-verify = { git = "https://github.com/TinyCloudLabs/OpenCredentials", rev = "c9fa2fe", package = "opencredentials-verify" }
policy-core = { path = "../.." }
policy-evidence-vc = { path = "../policy-evidence-vc" }
policy-runtime = { path = "../policy-runtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
did-method-key = { git = "https://github.com/tinycloudlabs/ssi", rev = "9d519692ab1b07b53d71f27ebad8473d64c338bf", default-features = false }
opencredentials-verify = { git = "https://github.com/TinyCloudLabs/OpenCredentials", rev = "c9fa2fe", package = "opencredentials-verify" }
sha2 = "0.10"
ssi-ucan = { git = "https://github.com/tinycloudlabs/ssi", rev = "9d519692ab1b07b53d71f27ebad8473d64c338bf" }
ssi-verification-methods = { git = "https://github.com/tinycloudlabs/ssi", rev = "9d519692ab1b07b53d71f27ebad8473d64c338bf", default-features = false, features = ["ed25519"] }
tower = { version = "0.5", features = ["util"] }
