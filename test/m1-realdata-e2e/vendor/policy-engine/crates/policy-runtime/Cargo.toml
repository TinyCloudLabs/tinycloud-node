[package]
name = "policy-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
name = "policy_runtime"
path = "src/lib.rs"

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
getrandom = "0.2"
policy-core = { path = "../.." }
policy-evidence-vc = { path = "../policy-evidence-vc", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[features]
default = ["vc-evidence"]
vc-evidence = ["dep:policy-evidence-vc"]

[dev-dependencies]
bs58 = "0.5"
ed25519-dalek = "2"
opencredentials-verify = { path = "../../../opencredentials/opencredentials_verify" }
