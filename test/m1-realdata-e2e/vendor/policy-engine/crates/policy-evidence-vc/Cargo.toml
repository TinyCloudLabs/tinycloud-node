[package]
name = "policy-evidence-vc"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
name = "policy_evidence_vc"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
opencredentials-verify = { path = "../../../opencredentials/opencredentials_verify" }
opencredentials_sd_jwt = { path = "../../../opencredentials/opencredentials_sd_jwt" }
policy-core = { path = "../.." }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
