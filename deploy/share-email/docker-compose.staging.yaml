# TinyCloud Node share-email staging container.
#
# This file deliberately has no fallback values for image, database URL,
# config, CA, trust key, or node secret. Compose refuses to interpolate a
# partial deployment; the node performs the second, cryptographic readiness
# check before serving the share-email routes.

services:
  tinycloud:
    image: ${TINYCLOUD_IMAGE:?set an immutable TinyCloud image reference}
    restart: unless-stopped
    read_only: true
    ports:
      - "${TINYCLOUD_BIND_PORT:-8000}:8000"
    environment:
      TINYCLOUD_CONFIG_FILE: /run/tinycloud/tinycloud.toml
      TINYCLOUD_STORAGE__DATABASE: ${TINYCLOUD_STORAGE_DATABASE:?set a PostgreSQL URL with sslmode=verify-full}
      TINYCLOUD_KEYS_SECRET: ${TINYCLOUD_KEYS_SECRET:?set the node key source out of band}
      TINYCLOUD_SHARE_EMAIL__TARGET_ORIGIN: ${TINYCLOUD_SHARE_EMAIL_TARGET_ORIGIN:?set the exact public node origin}
      TINYCLOUD_SHARE_EMAIL__NODE_AUDIENCE: ${TINYCLOUD_SHARE_EMAIL_NODE_AUDIENCE:?set the exact node audience DID}
      TINYCLOUD_SHARE_EMAIL__NODE_SIGNING_KID: ${TINYCLOUD_SHARE_EMAIL_NODE_SIGNING_KID:?set the enrolled node signer kid}
      TINYCLOUD_SHARE_EMAIL__INVITATION_KID: ${TINYCLOUD_SHARE_EMAIL_INVITATION_KID:?set the enrolled invitation kid}
      TINYCLOUD_SHARE_EMAIL__ISSUER_DID: ${TINYCLOUD_SHARE_EMAIL_ISSUER_DID:?set the enrolled OpenCredentials issuer DID}
      TINYCLOUD_SHARE_EMAIL__ISSUER_KID: ${TINYCLOUD_SHARE_EMAIL_ISSUER_KID:?set the enrolled OpenCredentials issuer kid}
      TINYCLOUD_SHARE_EMAIL__ISSUER_VCT: opencredentials.email/v1
      TINYCLOUD_SHARE_EMAIL__ISSUER_PUBLIC_KEY: ${TINYCLOUD_SHARE_EMAIL_ISSUER_PUBLIC_KEY:?set the pinned OpenCredentials issuer public key}
      TINYCLOUD_SHARE_EMAIL__INVITATION_PUBLIC_KEY: ${TINYCLOUD_SHARE_EMAIL_INVITATION_PUBLIC_KEY:?set the enrolled node invitation public key}
      TINYCLOUD_SHARE_EMAIL__POSTGRES_TLS__SSLMODE: verify-full
      TINYCLOUD_SHARE_EMAIL__POSTGRES_TLS__ROOT_CERT_PATH: /run/tinycloud/postgres-ca.pem
      TINYCLOUD_CORS: "false"
      ROCKET_ADDRESS: 0.0.0.0
    volumes:
      - type: bind
        source: ${TINYCLOUD_SHARE_EMAIL_CONFIG:?set a filled copy of tinycloud.toml.example}
        target: /run/tinycloud/tinycloud.toml
        read_only: true
      - type: bind
        source: ${TINYCLOUD_SHARE_EMAIL_AUTHORITY_MATERIAL:?set the operator-signed authority material bundle}
        target: /run/tinycloud/authority-material.json
        read_only: true
      - type: bind
        source: ${TINYCLOUD_POSTGRES_CA_CERT:?set the PostgreSQL CA bundle}
        target: /run/tinycloud/postgres-ca.pem
        read_only: true
