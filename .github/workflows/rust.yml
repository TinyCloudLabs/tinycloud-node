name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        pkg: ["tinycloud-auth", "tinycloud-node-server", "tinycloud-sdk-rs", "tinycloud-sdk-wasm"]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout TinyCloud repository
      uses: actions/checkout@v4
    - name: Add WASM target
      if: ${{ matrix.pkg == 'sdk-wasm' }}
      run: |
        rustup target add wasm32-unknown-unknown

    - name: Build
      working-directory: ${{ matrix.pkg }}
      run: cargo build

    - name: Run tests
      if: ${{ matrix.pkg != 'sdk-wasm' }}
      working-directory: ${{ matrix.pkg }}
      run: cargo test

  clippy:
    strategy:
      fail-fast: false
      matrix:
        pkg: ["tinycloud-auth", "tinycloud-node-server", "tinycloud-sdk-rs", "tinycloud-sdk-wasm"]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout TinyCloud repository
      uses: actions/checkout@v4
    - name: Add WASM target
      if: ${{ matrix.pkg == 'sdk-wasm' }}
      run: |
        rustup target add wasm32-unknown-unknown

    - name: Clippy
      working-directory: ${{ matrix.pkg }}
      run: RUSTFLAGS="-Dwarnings" cargo clippy

  fmt:
    strategy:
      fail-fast: false
      matrix:
        pkg: ["tinycloud-auth", "tinycloud-node-server", "tinycloud-sdk-rs", "tinycloud-sdk-wasm"]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout TinyCloud repository
      uses: actions/checkout@v4
    - name: Add WASM target
      if: ${{ matrix.pkg == 'sdk-wasm' }}
      run: |
        rustup target add wasm32-unknown-unknown

    - name: Fmt
      working-directory: ${{ matrix.pkg }}
      run: cargo fmt -- --check

  capabilities:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout TinyCloud repository
      uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Ensure rustfmt is available
      run: rustup component add rustfmt
    - name: Verify generated capability artifacts match capabilities.json
      run: node scripts/gen-capabilities.mjs --check

  m1-realdata:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
    - name: Checkout TinyCloud repository
      uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install M1 vector generator dependencies
      run: python -m pip install --requirement test/m1-realdata-e2e/requirements.txt
    - name: Check M1 scripts and formatting
      run: |
        bash -n scripts/m1-gate-demo.sh
        bash -n test/m1-realdata-e2e/scripts/snapshot-node-db.sh
        cargo fmt --manifest-path test/m1-realdata-e2e/Cargo.toml -p m1-realdata-e2e -- --check
    - name: Run deterministic M1 contract tests
      run: cargo test --locked --manifest-path test/m1-realdata-e2e/Cargo.toml
