name: Docker Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_duckdb:
        description: 'Build images with DuckDB support enabled'
        required: false
        type: boolean
        default: false
      deploy_phala:
        description: 'Deploy the dstack image to Phala after build'
        required: false
        type: boolean
        default: false
      image_version:
        description: 'Manual image version to tag/deploy. On the DNS-AID rollout branch, use dns-aid-dry-run, dns-aid-apply, or dns-aid-verify.'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tinycloudlabs/tinycloud-node

jobs:
  dns-aid:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/skgbafa/dns-aid-rollout' && github.actor == 'skgbafa' && (inputs.image_version == 'dns-aid-dry-run' || inputs.image_version == 'dns-aid-apply' || inputs.image_version == 'dns-aid-verify') }}
    runs-on: ubuntu-latest
    environment: production-dns
    concurrency:
      group: production-dns-tinycloud-xyz
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.PROD_TINYCLOUD_CLOUDFLARE_API_TOKEN }}
      DNS_AID_MODE: ${{ inputs.image_version }}
    steps:
      - name: Inspect or apply DNS-AID records and DNSSEC
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::PROD_TINYCLOUD_CLOUDFLARE_API_TOKEN is not configured"
            exit 1
          fi

          API_BASE="https://api.cloudflare.com/client/v4"
          ZONE_NAME="tinycloud.xyz"
          DNS_AID_NAMES=(
            '_a2a._agents.tinycloud.xyz'
            '_a2a._agents.protocol.tinycloud.xyz'
          )
          DNS_AID_TARGETS=(
            'tinycloud.xyz.'
            'protocol.tinycloud.xyz.'
          )
          AUTHORITATIVE_NAMESERVERS=(
            'candy.ns.cloudflare.com'
            'james.ns.cloudflare.com'
          )
          RECURSIVE_RESOLVERS=(
            '1.1.1.1'
            '8.8.8.8'
          )
          SVCB_VALUE='mandatory=alpn,port alpn="h2,h3" port=443'
          RESPONSE_FILE="$(mktemp)"
          DNS_RESPONSE_FILE="$(mktemp)"
          trap 'rm -f "$RESPONSE_FILE" "$DNS_RESPONSE_FILE"' EXIT

          cloudflare_request() {
            local method="$1"
            local path="$2"
            local payload="${3:-}"
            local status
            local -a args=(
              --silent
              --show-error
              --output "$RESPONSE_FILE"
              --write-out '%{http_code}'
              --request "$method"
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
              --header 'Content-Type: application/json'
            )

            if [ -n "$payload" ]; then
              args+=(--data "$payload")
            fi

            status="$(curl "${args[@]}" "${API_BASE}${path}")"
            if [[ ! "$status" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::Cloudflare API ${method} request failed with HTTP ${status}"
              jq -r '.errors[]? | "::error::Cloudflare error \(.code): \(.message)"' "$RESPONSE_FILE" || true
              exit 1
            fi
            if ! jq -e '.success == true and ((.errors // []) | length == 0)' "$RESPONSE_FILE" >/dev/null; then
              echo "::error::Cloudflare API ${method} request returned an unsuccessful response"
              jq -r '.errors[]? | "::error::Cloudflare error \(.code): \(.message)"' "$RESPONSE_FILE" || true
              exit 1
            fi
          }

          validate_svcb() {
            local source="$1"
            local expected_name="$2"
            local expected_target="$3"
            local input_file="$4"

            python3 - "$source" "$expected_name" "$expected_target" "$input_file" <<'PY'
          import json
          import shlex
          import sys

          source, expected_name, expected_target, input_file = sys.argv[1:]

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          def dns_name(value):
              return str(value).lower().rstrip(".")

          def parse_params(tokens):
              params = {}
              for token in tokens:
                  if "=" not in token:
                      fail("SVCB parameter is missing a value")
                  key, value = token.split("=", 1)
                  key = key.lower()
                  value = value.strip("\"'")
                  if key in params:
                      fail(f"SVCB parameter {key} is duplicated")
                  params[key] = value
              if set(params) != {"mandatory", "alpn", "port"}:
                  fail("SVCB parameters do not match mandatory, alpn, and port")

              mandatory_values = params["mandatory"].split(",")
              alpn_values = params["alpn"].split(",")
              if any(not item for item in mandatory_values + alpn_values):
                  fail("SVCB mandatory and ALPN lists cannot contain empty elements")
              if len(mandatory_values) != 2 or set(mandatory_values) != {"alpn", "port"}:
                  fail("SVCB mandatory keys do not match alpn and port")
              if len(alpn_values) != 2 or set(alpn_values) != {"h2", "h3"}:
                  fail("SVCB ALPN values do not match h2 and h3")
              if params["port"] != "443":
                  fail("SVCB port is not 443")

          if source == "api":
              with open(input_file, encoding="utf-8") as handle:
                  response = json.load(handle)
              records = response.get("result", [])
              if len(records) != 1:
                  fail("Cloudflare API did not return exactly one DNS-AID record")
              record = records[0]
              if dns_name(record.get("name", "")) != dns_name(expected_name):
                  fail("DNS-AID record owner does not match")
              if record.get("type") != "SVCB":
                  fail("DNS-AID owner has an unexpected RR type")
              if record.get("ttl") != 300:
                  fail("DNS-AID record TTL is not 300")
              if record.get("proxied") is not False:
                  fail("DNS-AID record is not DNS-only")
              data = record.get("data") or {}
              if data.get("priority") != 1:
                  fail("SVCB priority is not 1")
              if dns_name(data.get("target", "")) != dns_name(expected_target):
                  fail("SVCB target does not match")
              try:
                  params = shlex.split(data.get("value", ""))
              except (TypeError, ValueError) as error:
                  fail(f"Could not parse SVCB parameters: {error}")
              parse_params(params)
          elif source in {"dns", "recursive"}:
              with open(input_file, encoding="utf-8") as handle:
                  answers = [line.strip() for line in handle if line.strip() and not line.startswith(";")]
              if source == "recursive":
                  answers = [line for line in answers if len(line.split()) >= 4 and line.split()[3] == "SVCB"]
              if len(answers) != 1:
                  fail("Authoritative DNS did not return exactly one DNS-AID record")
              fields = answers[0].split(None, 5)
              if len(fields) != 6:
                  fail("Authoritative DNS returned an invalid SVCB answer")
              owner, ttl, dns_class, rr_type, priority, rdata = fields
              if dns_name(owner) != dns_name(expected_name):
                  fail("Authoritative DNS record owner does not match")
              if dns_class != "IN" or rr_type != "SVCB":
                  fail("Authoritative DNS record metadata does not match")
              if source == "dns" and ttl != "300":
                  fail("Authoritative DNS record TTL is not 300")
              if source == "recursive" and not (ttl.isdigit() and 0 < int(ttl) <= 300):
                  fail("Recursive DNS record TTL is outside the expected range")
              try:
                  rdata_fields = shlex.split(rdata)
              except ValueError as error:
                  fail(f"Could not parse authoritative SVCB answer: {error}")
              if priority != "1":
                  fail("Authoritative SVCB priority is not 1")
              if len(rdata_fields) < 2 or dns_name(rdata_fields[0]) != dns_name(expected_target):
                  fail("Authoritative SVCB target does not match")
              parse_params(rdata_fields[1:])
          else:
              fail("Unknown SVCB validation source")
          PY
          }

          validate_active_dnssec() {
            if ! jq -e '
              .result.status == "active" and
              .result.key_tag != null and
              .result.algorithm != null and
              .result.digest_type != null and
              ((.result.digest // "") | length > 0) and
              ((.result.ds // "") | length > 0)
            ' "$RESPONSE_FILE" >/dev/null; then
              echo "::error::DNSSEC is not active with complete public DS fields"
              exit 1
            fi
          }

          validate_enabled_dnssec() {
            if ! jq -e '
              (.result.status == "pending" or .result.status == "active") and
              .result.key_tag != null and
              .result.algorithm != null and
              .result.digest_type != null and
              ((.result.digest // "") | length > 0) and
              ((.result.ds // "") | length > 0)
            ' "$RESPONSE_FILE" >/dev/null; then
              echo "::error::DNSSEC is not pending or active with complete public DS fields"
              exit 1
            fi
          }

          validate_parent_ds() {
            local expected_ds="$1"
            local input_file="$2"

            python3 - "$ZONE_NAME" "$expected_ds" "$input_file" <<'PY'
          import sys

          expected_name, expected_ds, input_file = sys.argv[1:]

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          with open(input_file, encoding="utf-8") as handle:
              answers = [line.strip() for line in handle if line.strip() and not line.startswith(";")]
          if len(answers) != 1:
              fail("Parent zone did not return exactly one DS record")
          fields = answers[0].split(None, 4)
          if len(fields) != 5:
              fail("Parent zone returned an invalid DS answer")
          owner, ttl, dns_class, rr_type, actual_ds = fields
          if owner.lower().rstrip(".") != expected_name.lower().rstrip("."):
              fail("Parent DS owner does not match")
          if not ttl.isdigit() or dns_class != "IN" or rr_type != "DS":
              fail("Parent DS metadata does not match")

          expected = expected_ds.split()
          actual = actual_ds.split()
          if len(expected) != 4 or len(actual) != 4:
              fail("DS record does not contain four fields")
          expected[3] = expected[3].upper()
          actual[3] = actual[3].upper()
          if actual != expected:
              fail("Public parent DS does not exactly match the Cloudflare DS")
          PY
          }

          verify_authoritative_svcb() {
            local attempts="$1"
            local index name target nameserver authoritative_answer attempt

            for index in "${!DNS_AID_NAMES[@]}"; do
              name="${DNS_AID_NAMES[$index]}"
              target="${DNS_AID_TARGETS[$index]}"
              for nameserver in "${AUTHORITATIVE_NAMESERVERS[@]}"; do
                authoritative_answer=false
                for ((attempt = 1; attempt <= attempts; attempt++)); do
                  if dig +time=5 +tries=2 +norecurse +noall +comments +answer "@${nameserver}" "$name" SVCB > "$DNS_RESPONSE_FILE" && \
                    grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE" && \
                    awk '!/^;/ && NF { found = 1 } END { exit !found }' "$DNS_RESPONSE_FILE"; then
                    authoritative_answer=true
                    break
                  fi
                  if [ "$attempt" -lt "$attempts" ]; then
                    sleep 3
                  fi
                done
                if [ "$authoritative_answer" != "true" ]; then
                  echo "::error::Authoritative nameserver did not publish ${name}"
                  exit 1
                fi
                validate_svcb dns "$name" "$target" "$DNS_RESPONSE_FILE"
                echo "Authoritative DNS-AID record verified on ${nameserver}: ${name}"
              done
            done
          }

          verify_authoritative_dnssec() {
            local verify_records="${1:-true}"
            local nameserver name

            for nameserver in "${AUTHORITATIVE_NAMESERVERS[@]}"; do
              if ! dig +time=5 +tries=2 +norecurse +dnssec +noall +comments +answer "@${nameserver}" "$ZONE_NAME" DNSKEY > "$DNS_RESPONSE_FILE" || \
                ! grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE" || \
                ! awk '$4 == "DNSKEY" { key = 1 } $4 == "RRSIG" && $5 == "DNSKEY" { signature = 1 } END { exit !(key && signature) }' "$DNS_RESPONSE_FILE"; then
                echo "::error::Authoritative DNSKEY and RRSIG are not both visible"
                exit 1
              fi
              if [ "$verify_records" = "true" ]; then
                for name in "${DNS_AID_NAMES[@]}"; do
                  if ! dig +time=5 +tries=2 +norecurse +dnssec +noall +comments +answer "@${nameserver}" "$name" SVCB > "$DNS_RESPONSE_FILE" || \
                    ! grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE" || \
                    ! awk '$4 == "SVCB" { record = 1 } $4 == "RRSIG" && $5 == "SVCB" { signature = 1 } END { exit !(record && signature) }' "$DNS_RESPONSE_FILE"; then
                    echo "::error::Authoritative SVCB and RRSIG are not both visible for ${name}"
                    exit 1
                  fi
                done
                echo "Authoritative DNSKEY and signed DNS-AID records verified on ${nameserver}."
              else
                echo "Authoritative DNSKEY and RRSIG verified on ${nameserver}."
              fi
            done
          }

          verify_recursive_ad() {
            local resolver index name target

            for resolver in "${RECURSIVE_RESOLVERS[@]}"; do
              for index in "${!DNS_AID_NAMES[@]}"; do
                name="${DNS_AID_NAMES[$index]}"
                target="${DNS_AID_TARGETS[$index]}"
                if ! dig +time=5 +tries=2 +dnssec +noall +comments +answer "@${resolver}" "$name" SVCB > "$DNS_RESPONSE_FILE" || \
                  ! grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE" || \
                  ! grep -Eq 'flags:.*[[:space:]]ad([[:space:]]|;)' "$DNS_RESPONSE_FILE"; then
                  echo "::error::Recursive resolver did not return an authenticated answer for ${name}"
                  exit 1
                fi
                validate_svcb recursive "$name" "$target" "$DNS_RESPONSE_FILE"
                echo "Recursive DNSSEC validation passed on ${resolver}: ${name}"
              done
            done
          }

          verify_parent_ds_match() {
            local expected_ds="$1"
            local nameserver

            for nameserver in "${PARENT_NAMESERVERS[@]}"; do
              if ! dig +time=5 +tries=2 +norecurse +noall +comments +answer "@${nameserver}" "$ZONE_NAME" DS > "$DNS_RESPONSE_FILE" || \
                ! grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE"; then
                echo "::error::Failed to query the parent zone for DS records"
                exit 1
              fi
              validate_parent_ds "$expected_ds" "$DNS_RESPONSE_FILE"
              echo "Cloudflare DS matches the public parent DS on ${nameserver}."
            done
          }

          cloudflare_request GET "/zones?name=${ZONE_NAME}&status=active&per_page=50"
          if [ "$(jq '.result | length' "$RESPONSE_FILE")" -ne 1 ]; then
            echo "::error::Expected exactly one active ${ZONE_NAME} zone"
            exit 1
          fi
          ZONE_ID="$(jq -r '.result[0].id' "$RESPONSE_FILE")"
          jq '{zone: (.result[0] | {name, status})}' "$RESPONSE_FILE"

          cloudflare_request GET "/zones/${ZONE_ID}/dns_records?type=SVCB&name.contains=_agents&per_page=100"
          jq '{dns_aid_records: [.result[] | {type, name, ttl, proxied, data}]}' "$RESPONSE_FILE"

          cloudflare_request GET "/zones/${ZONE_ID}/dnssec"
          DNSSEC_STATUS="$(jq -r '.result.status' "$RESPONSE_FILE")"
          jq '{dnssec: (.result | {status, key_tag, algorithm, digest_type, digest, ds})}' "$RESPONSE_FILE"

          MISSING_RECORDS=()

          for index in "${!DNS_AID_NAMES[@]}"; do
            name="${DNS_AID_NAMES[$index]}"
            target="${DNS_AID_TARGETS[$index]}"
            cloudflare_request GET "/zones/${ZONE_ID}/dns_records?name=${name}&per_page=100"
            count="$(jq '.result | length' "$RESPONSE_FILE")"
            if [ "$count" -gt 1 ]; then
              echo "::error::Found multiple DNS records at ${name}; refusing to continue"
              exit 1
            fi
            if [ "$count" -eq 1 ]; then
              validate_svcb api "$name" "$target" "$RESPONSE_FILE"
              echo "DNS-AID record already matches semantically: ${name}"
            else
              MISSING_RECORDS+=("$index")
            fi
          done

          if ! command -v dig >/dev/null; then
            sudo apt-get update
            sudo apt-get install --yes dnsutils
          fi

          mapfile -t PARENT_NAMESERVERS < <(dig +short NS xyz.)
          if [ "${#PARENT_NAMESERVERS[@]}" -eq 0 ]; then
            echo "::error::Could not discover authoritative nameservers for the xyz parent zone"
            exit 1
          fi

          PARENT_DS_PRESENT=false
          for nameserver in "${PARENT_NAMESERVERS[@]}"; do
            if ! dig +time=5 +tries=2 +norecurse +noall +comments +answer "@${nameserver}" "$ZONE_NAME" DS > "$DNS_RESPONSE_FILE" || \
              ! grep -q 'status: NOERROR' "$DNS_RESPONSE_FILE"; then
              echo "::error::Failed to query the parent zone for DS records"
              exit 1
            fi
            while IFS= read -r answer; do
              if [[ -n "$answer" && "$answer" != \;* ]]; then
                PARENT_DS_PRESENT=true
                echo "Public parent DS on ${nameserver}: ${answer}"
              fi
            done < "$DNS_RESPONSE_FILE"
          done

          if [ "$DNS_AID_MODE" = "dns-aid-dry-run" ]; then
            for index in "${MISSING_RECORDS[@]}"; do
              echo "DNS-AID dry run would create: ${DNS_AID_NAMES[$index]}"
            done
            if [ "${#MISSING_RECORDS[@]}" -eq 0 ]; then
              verify_authoritative_svcb 1
            else
              echo "Dry run skipped authoritative DNS-AID expectations because records are not yet present."
            fi

            if [ "$DNSSEC_STATUS" = "disabled" ]; then
              if [ "$PARENT_DS_PRESENT" = "true" ]; then
                echo "::error::A public parent DS exists while Cloudflare DNSSEC is disabled"
                exit 1
              fi
              echo "Dry run would enable Cloudflare DNSSEC and emit DS fields; parent DS is currently absent."
            elif [ "$DNSSEC_STATUS" = "pending" ] || [ "$DNSSEC_STATUS" = "active" ]; then
              cloudflare_request GET "/zones/${ZONE_ID}/dnssec"
              validate_enabled_dnssec
              CLOUDFLARE_DS="$(jq -r '[.result.key_tag, .result.algorithm, .result.digest_type, .result.digest] | map(tostring) | join(" ")' "$RESPONSE_FILE")"
              if [ "$PARENT_DS_PRESENT" = "true" ]; then
                verify_parent_ds_match "$CLOUDFLARE_DS"
              else
                echo "Public parent DS is not present yet."
              fi
              if [ "${#MISSING_RECORDS[@]}" -eq 0 ]; then
                verify_authoritative_dnssec true
                if [ "$DNSSEC_STATUS" = "active" ] && [ "$PARENT_DS_PRESENT" = "true" ]; then
                  verify_recursive_ad
                else
                  echo "Dry run skipped recursive AD expectations until DNSSEC and the parent DS are active."
                fi
              else
                verify_authoritative_dnssec false
              fi
            else
              echo "::error::Cloudflare DNSSEC is in unsupported state ${DNSSEC_STATUS}"
              exit 1
            fi
            echo "DNS-AID dry run completed without changes."
            exit 0
          fi

          if [ "$DNS_AID_MODE" = "dns-aid-verify" ]; then
            if [ "${#MISSING_RECORDS[@]}" -ne 0 ]; then
              echo "::error::DNS-AID verify requires both exact SVCB records"
              exit 1
            fi
            cloudflare_request GET "/zones/${ZONE_ID}/dnssec"
            validate_active_dnssec
            CLOUDFLARE_DS="$(jq -r '[.result.key_tag, .result.algorithm, .result.digest_type, .result.digest] | map(tostring) | join(" ")' "$RESPONSE_FILE")"
            verify_parent_ds_match "$CLOUDFLARE_DS"
            verify_authoritative_svcb 1
            verify_authoritative_dnssec true
            verify_recursive_ad
            jq '{dnssec: (.result | {status, key_tag, algorithm, digest_type, digest, ds})}' "$RESPONSE_FILE"
            echo "DNS-AID and DNSSEC verification completed successfully."
            exit 0
          fi

          if [ "$DNS_AID_MODE" != "dns-aid-apply" ]; then
            echo "::error::Unsupported DNS-AID mode"
            exit 1
          fi
          if [ "$DNSSEC_STATUS" != "disabled" ] && [ "$DNSSEC_STATUS" != "pending" ] && [ "$DNSSEC_STATUS" != "active" ]; then
            echo "::error::DNSSEC must be disabled, pending, or active before apply; current status is ${DNSSEC_STATUS}"
            exit 1
          fi
          if [ "$DNSSEC_STATUS" = "disabled" ] && [ "$PARENT_DS_PRESENT" = "true" ]; then
            echo "::error::A public parent DS exists while Cloudflare DNSSEC is disabled"
            exit 1
          fi
          if [ "$DNSSEC_STATUS" = "pending" ] || [ "$DNSSEC_STATUS" = "active" ]; then
            cloudflare_request GET "/zones/${ZONE_ID}/dnssec"
            validate_enabled_dnssec
            CLOUDFLARE_DS="$(jq -r '[.result.key_tag, .result.algorithm, .result.digest_type, .result.digest] | map(tostring) | join(" ")' "$RESPONSE_FILE")"
            if [ "$PARENT_DS_PRESENT" = "true" ]; then
              verify_parent_ds_match "$CLOUDFLARE_DS"
            fi
          fi

          for index in "${MISSING_RECORDS[@]}"; do
            name="${DNS_AID_NAMES[$index]}"
            target="${DNS_AID_TARGETS[$index]}"
            payload="$(jq -cn \
              --arg name "$name" \
              --arg target "$target" \
              --arg value "$SVCB_VALUE" \
              '{type: "SVCB", name: $name, ttl: 300, proxied: false, data: {priority: 1, target: $target, value: $value}}')"
            cloudflare_request POST "/zones/${ZONE_ID}/dns_records" "$payload"
            jq '{created_dns_aid_record: (.result | {type, name, ttl, proxied, data})}' "$RESPONSE_FILE"
          done

          for index in "${!DNS_AID_NAMES[@]}"; do
            name="${DNS_AID_NAMES[$index]}"
            target="${DNS_AID_TARGETS[$index]}"
            cloudflare_request GET "/zones/${ZONE_ID}/dns_records?name=${name}&per_page=100"
            if [ "$(jq '.result | length' "$RESPONSE_FILE")" -ne 1 ]; then
              echo "::error::Expected exactly one DNS-AID record for ${name} after apply"
              exit 1
            fi
            validate_svcb api "$name" "$target" "$RESPONSE_FILE"
          done
          verify_authoritative_svcb 10

          if [ "$DNSSEC_STATUS" = "disabled" ]; then
            cloudflare_request PATCH "/zones/${ZONE_ID}/dnssec" '{"status":"active"}'
            if ! jq -e '.result.status == "pending" or .result.status == "active"' "$RESPONSE_FILE" >/dev/null; then
              echo "::error::Cloudflare did not accept the DNSSEC enable request"
              exit 1
            fi
          else
            echo "Cloudflare DNSSEC is already ${DNSSEC_STATUS}; no DNSSEC mutation needed."
          fi

          DNSSEC_READY=false
          for attempt in {1..10}; do
            cloudflare_request GET "/zones/${ZONE_ID}/dnssec"
            if jq -e '
              (.result.status == "pending" or .result.status == "active") and
              .result.key_tag != null and
              .result.algorithm != null and
              .result.digest_type != null and
              ((.result.digest // "") | length > 0) and
              ((.result.ds // "") | length > 0)
            ' "$RESPONSE_FILE" >/dev/null; then
              DNSSEC_READY=true
              break
            fi
            if [ "$attempt" -lt 10 ]; then
              sleep 3
            fi
          done
          if [ "$DNSSEC_READY" != "true" ]; then
            echo "::error::Cloudflare DNSSEC did not expose complete DS fields"
            exit 1
          fi
          validate_enabled_dnssec
          jq '{dnssec: (.result | {status, key_tag, algorithm, digest_type, digest, ds})}' "$RESPONSE_FILE"
          if [ "$(jq -r '.result.status' "$RESPONSE_FILE")" = "pending" ]; then
            echo "Cloudflare DNSSEC is pending external registrar DS publication; no registrar mutation was attempted."
          else
            echo "Cloudflare DNSSEC is active."
          fi

  build:
    if: ${{ github.ref != 'refs/heads/skgbafa/dns-aid-rollout' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve optional build features
        id: build_features
        run: |
          FEATURES=""
          IMAGE_SUFFIX=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_duckdb }}" = "true" ]; then
            FEATURES="duckdb"
            IMAGE_SUFFIX="-duckdb"
          fi
          echo "cargo_features=${FEATURES}" >> "$GITHUB_OUTPUT"
          echo "image_suffix=${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "manual_version=${{ inputs.image_version }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ steps.build_features.outputs.image_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ steps.build_features.outputs.image_suffix }}
            type=semver,pattern={{major}},suffix=${{ steps.build_features.outputs.image_suffix }}
            type=raw,value=${{ steps.build_features.outputs.manual_version }}${{ steps.build_features.outputs.image_suffix }},enable=${{ github.event_name == 'workflow_dispatch' && steps.build_features.outputs.manual_version != '' }}
            type=sha,prefix=
            type=raw,value=latest${{ steps.build_features.outputs.image_suffix }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CARGO_FEATURES=${{ steps.build_features.outputs.cargo_features }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dstack:
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/skgbafa/dns-aid-rollout' && (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve optional build features
        id: build_features
        run: |
          FEATURES="dstack"
          IMAGE_SUFFIX=""
          SHA_PREFIX="dstack-"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_duckdb }}" = "true" ]; then
            FEATURES="dstack duckdb"
            IMAGE_SUFFIX="-duckdb"
            SHA_PREFIX="dstack-duckdb-"
          fi
          echo "cargo_features=${FEATURES}" >> "$GITHUB_OUTPUT"
          echo "image_suffix=${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "sha_prefix=${SHA_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "manual_version=${{ inputs.image_version }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=-dstack${{ steps.build_features.outputs.image_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=-dstack${{ steps.build_features.outputs.image_suffix }}
            type=semver,pattern={{major}},suffix=-dstack${{ steps.build_features.outputs.image_suffix }}
            type=raw,value=${{ steps.build_features.outputs.manual_version }}-dstack${{ steps.build_features.outputs.image_suffix }},enable=${{ github.event_name == 'workflow_dispatch' && steps.build_features.outputs.manual_version != '' }}
            type=sha,prefix=${{ steps.build_features.outputs.sha_prefix }}
            type=raw,value=dstack${{ steps.build_features.outputs.image_suffix }},enable={{is_default_branch}}

      - name: Build and push dstack Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CARGO_FEATURES=${{ steps.build_features.outputs.cargo_features }}
          cache-from: type=gha,scope=dstack
          cache-to: type=gha,mode=max,scope=dstack

  deploy-phala:
    runs-on: ubuntu-latest
    needs: [build, build-dstack]
    if: ${{ github.ref != 'refs/heads/skgbafa/dns-aid-rollout' && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy_phala)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Update compose with release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.image_version }}"
            if [ -z "${TAG}" ]; then
              if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
                echo "::error::workflow_dispatch deploy_phala requires image_version unless the workflow is run from a tag"
                exit 1
              fi
              TAG="${GITHUB_REF_NAME}"
            fi
          fi
          # metadata-action emits {{version}} without the leading v (e.g. 1.3.0).
          # Strip a leading v from the tag to match the pushed image tag.
          VERSION="${TAG#v}"
          DUCKDB_SUFFIX=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_duckdb }}" = "true" ]; then
            DUCKDB_SUFFIX="-duckdb"
          fi
          # The prod CVM uses the dstack-suffixed image. Replace the floating
          # ":dstack" tag in the checked-in compose with the versioned tag
          # built by the build-dstack job (e.g. ":1.3.0-dstack" or
          # ":1.3.0-dstack-duckdb").
          sed -i "s|ghcr.io/tinycloudlabs/tinycloud-node:dstack|ghcr.io/tinycloudlabs/tinycloud-node:${VERSION}-dstack${DUCKDB_SUFFIX}|g" docker-compose.dstack-postgres.yaml
          echo "Resolved image tag: ghcr.io/tinycloudlabs/tinycloud-node:${VERSION}-dstack${DUCKDB_SUFFIX}"
          cat docker-compose.dstack-postgres.yaml

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          PHALA_ENV_DATABASE_URL: ${{ secrets.PROD_TINYCLOUD_DATABASE_URL }}
          PHALA_ENV_S3_BUCKET: ${{ secrets.PROD_TINYCLOUD_S3_BUCKET }}
          PHALA_ENV_S3_ENDPOINT: ${{ secrets.PROD_TINYCLOUD_S3_ENDPOINT }}
          PHALA_ENV_AWS_KEY: ${{ secrets.PROD_TINYCLOUD_AWS_ACCESS_KEY_ID }}
          PHALA_ENV_AWS_SECRET: ${{ secrets.PROD_TINYCLOUD_AWS_SECRET_ACCESS_KEY }}
          PHALA_ENV_AWS_REGION: ${{ secrets.PROD_TINYCLOUD_AWS_REGION }}
          PHALA_ENV_TINYCLOUD_QUOTA_URL: ${{ secrets.PROD_TINYCLOUD_QUOTA_URL }}
          PHALA_ENV_TINYCLOUD_ADMIN_SECRET: ${{ secrets.PROD_TINYCLOUD_ADMIN_SECRET }}
          PHALA_ENV_CLOUDFLARE_API_TOKEN: ${{ secrets.PROD_TINYCLOUD_CLOUDFLARE_API_TOKEN }}
          PHALA_ENV_DSTACK_GATEWAY_DOMAIN: ${{ secrets.PROD_TINYCLOUD_DSTACK_GATEWAY_DOMAIN }}
          PHALA_ENV_CERTBOT_EMAIL: ${{ secrets.PROD_TINYCLOUD_CERTBOT_EMAIL }}
        # Update the existing prod CVM (name: tinycloud-node) in the
        # Tiny Cloud workspace. The PHALA_CLOUD_API_KEY secret is
        # workspace-scoped and must be issued from that workspace.
        run: |
          set -euo pipefail

          required_vars=(
            PHALA_CLOUD_API_KEY
            PHALA_ENV_DATABASE_URL
            PHALA_ENV_S3_BUCKET
            PHALA_ENV_S3_ENDPOINT
            PHALA_ENV_AWS_KEY
            PHALA_ENV_AWS_SECRET
            PHALA_ENV_AWS_REGION
            PHALA_ENV_TINYCLOUD_QUOTA_URL
            PHALA_ENV_TINYCLOUD_ADMIN_SECRET
            PHALA_ENV_CLOUDFLARE_API_TOKEN
            PHALA_ENV_DSTACK_GATEWAY_DOMAIN
            PHALA_ENV_CERTBOT_EMAIL
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required GitHub secret for Phala deploy: ${var#PHALA_ENV_}"
              exit 1
            fi
          done

          {
            printf 'DATABASE_URL=%s\n' "$PHALA_ENV_DATABASE_URL"
            printf 'S3_BUCKET=%s\n' "$PHALA_ENV_S3_BUCKET"
            printf 'S3_ENDPOINT=%s\n' "$PHALA_ENV_S3_ENDPOINT"
            printf 'AWS_KEY=%s\n' "$PHALA_ENV_AWS_KEY"
            printf 'AWS_SECRET=%s\n' "$PHALA_ENV_AWS_SECRET"
            printf 'AWS_REGION=%s\n' "$PHALA_ENV_AWS_REGION"
            printf 'TINYCLOUD_QUOTA_URL=%s\n' "$PHALA_ENV_TINYCLOUD_QUOTA_URL"
            printf 'TINYCLOUD_ADMIN_SECRET=%s\n' "$PHALA_ENV_TINYCLOUD_ADMIN_SECRET"
            printf 'CLOUDFLARE_API_TOKEN=%s\n' "$PHALA_ENV_CLOUDFLARE_API_TOKEN"
            printf 'DSTACK_GATEWAY_DOMAIN=%s\n' "$PHALA_ENV_DSTACK_GATEWAY_DOMAIN"
            printf 'CERTBOT_EMAIL=%s\n' "$PHALA_ENV_CERTBOT_EMAIL"
            # SSH public keys authorized on the CVM (checked into the repo,
            # see dstack-authorized-keys). The Phala Cloud pre-launch script
            # writes DSTACK_AUTHORIZED_KEYS to /home/root/.ssh/authorized_keys
            # at boot, enabling `phala ssh tinycloud-node`.
            printf 'DSTACK_AUTHORIZED_KEYS=%s\n' "$(cat dstack-authorized-keys)"
          } > .phala-prod.env

          phala deploy --cvm-id tinycloud-node -c docker-compose.dstack-postgres.yaml -e .phala-prod.env --wait
