name: Phala Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Inspect prod CVM
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -x
          phala status
          phala ps --cvm-id tinycloud-node || true
          phala logs dstack-tinycloud-1 --cvm-id tinycloud-node --stderr -n 300 || true
          phala logs dstack-tinycloud-1 --cvm-id tinycloud-node -n 300 || true
          phala logs dstack-dstack-ingress-1 --cvm-id tinycloud-node --stderr -n 300 || true
          phala logs dstack-dstack-ingress-1 --cvm-id tinycloud-node -n 300 || true
          phala logs --cvm-id tinycloud-node --cvm-stderr -n 300 || true
          phala logs --cvm-id tinycloud-node --cvm-stdout -n 300 || true
          phala logs --cvm-id tinycloud-node --serial -n 300 || true
