[package]
name = "tinycloud-node"
version = "1.3.0"
authors = ["TinyCloud Protocol"]
edition = "2021"
description = "TinyCloud Protocol Node"
repository = "https://github.com/TinyCloudLabs/tinycloud-node"
license-file = "../LICENSE.md"

[lib]
name = "tinycloud"
path = "src/lib.rs"

[[bin]]
name = "tinycloud"
path = "src/main.rs"

[dependencies]
anyhow = "1"
aws-config = "0.49"
aws-sdk-dynamodb = "0.19"
aws-sdk-s3 = "0.19"
aws-types = "0.49"
aws-smithy-http = "0.49"
base64 = "0.13"
futures = { default-features = false, version = "0.3", features = ["alloc", "std"] }
hex.workspace = true
hmac = "0.12"
hyper = "0.14"
lazy_static = "1.4.0"
opentelemetry = { version = "0.29.1" }
opentelemetry_sdk = { version = "0.29.0", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.29.0", features = ["grpc-tonic", "trace"] }
pin-project = "1"
prometheus = { version = "0.13.0", features = ["process"] }
reqwest = { version = "0.11", features = ["json"] }
rocket = { version = "0.5.1", features = ["json", "tls", "mtls"] }
subtle = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_with = { version = "3.0", features = ["hex"] }
sha2 = "0.10"
thiserror = "2.0"
time.workspace = true
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
tokio-stream = { version = "0.1", features = ["fs"] }
tokio-util = { version = "0.7", features = ["compat"] }
tracing = "0.1"
tracing-log = "0.2"
tracing-opentelemetry = "0.30"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }

[dependencies.tinycloud-core]
path = "../tinycloud-core/"
features = ["sqlite", "postgres", "mysql", "tokio"]

[dependencies.tinycloud-auth]
path = "../tinycloud-auth/"

[features]
default = []
dstack = []

# cargo-binstall support: allows `cargo binstall tinycloud-node`
[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/{ name }-v{ version }/{ name }-{ target }{ archive-suffix }"
bin-dir = "{ name }-{ target }/{ bin }{ binary-ext }"
pkg-fmt = "tgz"

# cargo-dist metadata
[package.metadata.dist]
dist = true
